openapi: 3.1.0
info:
  title: CodeQL Graph API
  description: API to submit CodeQL graph analysis jobs
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /jobs:
    post:
      summary: Submit a CodeQL analysis job
      operationId: createJob
      tags:
        - Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Job successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateJobResponse'
        '400':
          description: Invalid request
        '500':
          description: Internal server error

    get:
      summary: List executed jobs
      operationId: listExecutedJobs
      tags:
        - Jobs
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by final status
          schema:
            $ref: '#/components/schemas/FinalJobStatus'
        - name: limit
          in: query
          required: false
          description: Max number of items to return (1..200)
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          description: Offset for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Executed jobs list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutedJobsResponse'

  /listPr:
    get:
      summary: Get list of Pull Requests
      description: Returns a list of PR/MR identification numbers based on the project URL and the detected Git provider.
      tags:
        - WebRepo
      parameters:
        - name: projectUrl
          in: query
          description: The full Git clone URL (GitHub, GitLab, Azure, ...)
          required: true
          schema:
            type: string
            format: uri
            example: "https://github.com/pjalbrz16/mem.git"
      responses:
        '200':
          description: A list of PR/MR IDs discovered
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["101", "102", "105"]
        '400':
          description: Invalid project URL or unsupported provider
        '500':
          description: Internal error while executing Git commands

  /selectPr:
    post:
      summary: Select a PR for analysis
      description: |
        Triggers the internal process to calculate metrics and generate a dependency graph 
        for a specific Pull Request.
      tags:
        - WebRepo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                projectUrl:
                  type: string
                  format: uri
                  description: The full Git repository URL.
                  example: "https://github.com/pjalbrz16/mem.git"
                prId:
                  type: string
                  description: The unique ID of the Pull Request (as returned by /listPr).
                  example: "1"
      responses:
        '200':
          description: PR successfully selected and analysis initiated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ANALYSIS_STARTED"
                  message:
                    type: string
                    example: "Generating CodeQL metrics and .dot graph for PR #1"
        '404':
          description: Project or PR ID not found in the local workspace.
        '500':
          description: Failed to initialize Git diff or CodeQL database.

components:
  schemas:
    CreateJobRequest:
      type: object
      required:
        - repoUrl
        - language
      properties:
        repoUrl:
          type: string
          format: uri
          example: https://github.com/example/project
        language:
          type: string
          example: java

    CreateJobResponse:
      type: object
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
          example: 8f2a3b1e-6a1f-4a91-9c42-9b2b0f7f4c01
        status:
          type: string
          example: QUEUED
    FinalJobStatus:
      type: string
      enum: [ SUCCEEDED, FAILED ]

    ExecutedJobsResponse:
      type: object
      required: [ items, total ]
      properties:
        total:
          type: integer
          description: Total executed jobs matching the filter (not just returned page)
          example: 123
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobSummary'

    JobSummary:
      type: object
      required: [ jobId, repoUrl, status, createdAt, finishedAt ]
      properties:
        jobId:
          type: string
          example: 8f2a3b1e-6a1f-4a91-9c42-9b2b0f7f4c01
        repoUrl:
          type: string
          format: uri
          example: https://github.com/example/project
        status:
          $ref: '#/components/schemas/FinalJobStatus'
        createdAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time