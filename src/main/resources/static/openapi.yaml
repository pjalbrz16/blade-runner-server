openapi: 3.1.0
info:
  title: Blade Runner
  description: Blade Runner desc
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /metrics:
    post:
      summary: Receive metrics using github webhook
      operationId: postMetrics
      security:
        - BearerAuth: [ ]
      tags:
        - Metrics
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GithubMetrics'
      responses:
        '200':
          description: Metrics processed successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid backendToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Get metrics for project
      operationId: getMetrics
      tags:
        - Metrics
      parameters:
        - name: projectUrl
          in: query
          required: true
          description: Project url
          schema:
            type: string
            format: uri
            example: "https://github.com/pjalbrz16/mem.git"
        - name: prId
          in: query
          required: true
          description: Pull request ID
          schema:
            type: string
            example: "123"
      responses:
        '200':
          description: Pull request metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullRequestMetrics'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /listPr:
    get:
      summary: Get list of Pull Requests
      description: Returns a list of PR/MR identification numbers based on the project URL and the detected Git provider.
      tags:
        - RemoteRepository
      parameters:
        - name: projectUrl
          in: query
          description: The full Git clone URL (GitHub, GitLab, Azure, ...)
          required: true
          schema:
            type: string
            format: uri
            example: "https://github.com/pjalbrz16/mem.git"
      responses:
        '200':
          description: A list of PR/MR IDs discovered
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PullRequestInfo'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /addProjectPullRequest:
    post:
      summary: Add a new project for metrics scanning
      tags:
        - RemoteRepository
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectMetadata'
      responses:
        '200':
          description: Project added successfully, scanning will start ...
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
    PullRequestMetrics:
      type: object
      properties:
        sonarMetrics:
          $ref: '#/components/schemas/SonarData'
        sarif:
          type: object
          additionalProperties: true
          description: "The full SARIF JSON object (Static Analysis Results Interchange Format)"
        dotFile:
          type: string
          format: graphviz-dot
          description: "The Graphviz .dot string representing data flow"
          example: "digraph G { node1 -> node2 }"
    GithubMetrics:
      type: object
      properties:
        prId:
          type: string
          description: The Pull Request ID
        projectUrl:
          type: string
          description: The URL of the repository scanned
        sarifFile:
          type: string
          format: binary
          description: The CodeQL java.sarif output file
        impactedFiles:
          type: string
          format: binary
          description: The generated impacted_files.csv
        callGraphCsv:
          type: string
          format: binary
          description: The generated call_graph.csv from codeQL query results

    SonarData:
      type: object
      properties:
        qualityGateStatus:
          type: string
          example: "OK"
        analysisDate:
          type: string
          format: date-time
        vulnerabilities:
          type: integer
          example: 10
        securityHotspots:
          type: integer
          example: 5
        codeSmells:
          type: integer
          example: 2
        bugs:
          type: integer
          example: 1

    ProjectMetadata:
      type: object
      properties:
        projectUrl:
          type: string
          format: uri
          example: "https://github.com/org/repo"
        prId:
          type: string
          example: "12345"

    PullRequestInfo:
      type: object
      properties:
        id:
          type: string
          description: "The PR number"
        title:
          type: string
        author:
          type: string
        url:
          type: string
          description: "The link to the PR on GitHub"